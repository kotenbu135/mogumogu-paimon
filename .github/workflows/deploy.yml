name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "webapp/**"
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: webapp

      - name: Build
        run: npm run build
        working-directory: webapp

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webapp/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  lighthouse:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.js
          uploadArtifacts: true

      - name: Copy report to docs/lighthouse
        run: |
          mkdir -p docs/lighthouse
          cp .lighthouseci/lhr-*.html docs/lighthouse/report.html
          cp .lighthouseci/lhr-*.json docs/lighthouse/report.json

      - name: Commit and push Lighthouse report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/lighthouse/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci(lighthouse): update lighthouse report [skip ci]"
          git push
