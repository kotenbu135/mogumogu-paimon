name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: webapp

      - name: Lint
        run: npm run lint
        working-directory: webapp

      - name: Typecheck
        run: npm run typecheck
        working-directory: webapp

      - name: Test
        run: npm test
        working-directory: webapp